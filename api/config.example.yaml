# Sambmin Configuration
# Copy to /usr/local/etc/sambmin/config.yaml (FreeBSD)
#   or /opt/sambmin/config.yaml (Linux) and edit for your environment.
#
# Set SAMBMIN_CONFIG env var to override the config path.
# Set SAMBMIN_BIND_PW env var to provide the LDAP bind password securely.

bind_addr: "127.0.0.1"
port: 8443
allowed_origins:
  - "https://sambmin.example.com"
  - "http://localhost:5173"  # Vite dev server

# Domain controllers — list all DCs, mark one as primary
domain_controllers:
  - hostname: "dc1.example.com"
    address: "10.0.0.1"
    site: "Default-First-Site-Name"
    port: 636  # LDAPS
    primary: true
  - hostname: "dc2.example.com"
    address: "10.0.0.2"
    site: "Remote-Site"
    port: 636

# LDAP service account for read operations
base_dn: "DC=example,DC=com"
bind_dn: "CN=sambmin-svc,CN=Users,DC=example,DC=com"
# bind_pw: Use SAMBMIN_BIND_PW env var instead of storing password here

# Kerberos configuration
kerberos:
  realm: "EXAMPLE.COM"
  kdc: "dc1.example.com"
  keytab_path: "/usr/local/etc/sambmin/sambmin.keytab"
  implementation: "heimdal"  # "heimdal" or "mit"

# Path to Python utility scripts
# FreeBSD: /usr/local/share/sambmin/scripts
# Linux:   /opt/sambmin/scripts
scripts_path: "/usr/local/share/sambmin/scripts"

# Session timeout in hours
session_timeout_hours: 8
