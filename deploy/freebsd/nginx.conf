# Sambmin Nginx Configuration (FreeBSD)
# Copy to /usr/local/etc/nginx/nginx.conf and adjust for your environment.
#
# Replace:
#   sambmin.yourdomain.com  — your Sambmin FQDN
#   /path/to/cert/          — your TLS certificate paths
#   /path/to/sambmin/web    — path to the built frontend (dist/)
#
# DNS: Create a CNAME or A record for sambmin.yourdomain.com
# Cert: certbot certonly -d sambmin.yourdomain.com

user www;
worker_processes 1;

error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /var/log/nginx/access.log;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_http_version 1.0;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_min_length 1100;
    gzip_buffers 16 8k;
    gzip_types text/plain text/css application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/gif image/jpeg image/png
               application/json image/svg+xml;

    upstream sambmin_api {
        server 127.0.0.1:8443;
        keepalive 32;
    }

    # HTTPS — Sambmin
    server {
        listen 443 ssl;
        server_name sambmin.yourdomain.com;

        ssl_certificate     /usr/local/etc/letsencrypt/live/sambmin.yourdomain.com/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/sambmin.yourdomain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Sambmin React frontend
        root /usr/local/share/sambmin/web;
        index index.html;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;

        # API proxy to Go backend
        location /api/ {
            proxy_pass http://sambmin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 300;
            proxy_connect_timeout 10;
        }

        # SPA fallback — serve index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache hashed static assets
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        access_log /var/log/nginx/sambmin_access.log;
        error_log  /var/log/nginx/sambmin_error.log;

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/local/www/nginx-dist;
        }
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name sambmin.yourdomain.com;
        return 301 https://$server_name$request_uri;
    }
}
