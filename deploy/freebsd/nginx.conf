user www;
worker_processes 1;

error_log /var/log/nginx/error.log debug;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /var/log/nginx/access.log;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_http_version 1.0;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_min_length 1100;
    gzip_buffers 16 8k;
    gzip_types text/plain text/css application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/gif image/jpeg image/png
               application/json image/svg+xml;

    types {
        text/plain log;
    }

    # =========================================================================
    # Sambmin - Samba AD Management (sambmin.dzsec.net)
    # =========================================================================
    # DNS: Add CNAME sambmin.dzsec.net -> bridger.dzsec.net
    # Cert: certbot certonly --expand -d bridger.dzsec.net -d sambmin.dzsec.net
    # =========================================================================

    upstream sambmin_api {
        server 127.0.0.1:8443;
        keepalive 32;
    }

    server {
        listen 443 ssl;
        server_name sambmin.dzsec.net;

        # Reusing bridger cert until certbot --expand adds sambmin SAN
        ssl_certificate /usr/local/etc/letsencrypt/live/bridger.dzsec.net/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/bridger.dzsec.net/privkey.pem;
        include /usr/local/etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /usr/local/etc/letsencrypt/ssl-dhparams.pem;

        # Sambmin React frontend
        root /home/administrator/sambmin/web;
        index index.html;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API proxy to Go backend
        location /api/ {
            proxy_pass http://sambmin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 300;
            proxy_connect_timeout 10;
        }

        # SPA fallback - serve index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache hashed static assets
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        access_log /var/log/nginx/sambmin_access.log;
        error_log /var/log/nginx/sambmin_error.log;

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/local/www/nginx-dist;
        }
    }

    server {
        listen 80;
        server_name sambmin.dzsec.net;
        return 301 https://$server_name$request_uri;
    }

    # =========================================================================
    # Bridger main server (bridger.dzsec.net)
    # =========================================================================
    server {
        listen 443 ssl;
        server_name bridger.dzsec.net;
        root /usr/local/www/nginx;
        index index.php index.html index.htm;
        charset UTF-8;

        ssl_certificate /usr/local/etc/letsencrypt/live/bridger.dzsec.net/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/bridger.dzsec.net/privkey.pem;
        include /usr/local/etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /usr/local/etc/letsencrypt/ssl-dhparams.pem;

        # Apple OTA Enrollment Server - Phase 1
        location /enroll {
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "close";
            proxy_set_header Upgrade "";
            proxy_set_header TE "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-SSL-Client-Cert "";
            proxy_set_header X-SSL-Client-Verify "";
            proxy_pass http://maverick.dzsec.net:8081/enroll$is_args$args;
        }

        # Phase 2 endpoint for Safari
        location /enroll-phase2 {
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "close";
            proxy_set_header Upgrade "";
            proxy_set_header TE "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-SSL-Client-Cert "";
            proxy_set_header X-SSL-Client-Verify "";
            proxy_pass http://maverick.dzsec.net:8081/enroll-phase2$is_args$args;
        }

        # iOS Kerberos Ticket Endpoint
        location /ticket {
            return 301 https://ticket.dzsec.net$request_uri;
        }

        # MDM Admin Bootstrap Profile
        location /mdm-admin/bootstrap-profile {
            proxy_pass http://maverick.dzsec.net:8081/bootstrap-profile;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MDM Admin Portal - Static frontend
        location /mdm-admin {
            alias /opt/mdm-admin/frontend;
            try_files $uri $uri/ /mdm-admin/index.html;
            index index.html;
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
            add_header X-XSS-Protection "1; mode=block";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
        }

        # MDM Admin API - Proxy to maverick
        location /api/ {
            proxy_pass http://maverick.dzsec.net:8081/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin "https://bridger.dzsec.net" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            if ($request_method = 'OPTIONS') {
                return 200;
            }
        }

        # OpenXPKI Web Interface
        location /openxpki {
            index index.html;
            root /usr/local/www/nginx/;
        }

        # OpenXPKI CGI Scripts
        location /cgi-bin/ {
            root /usr/local/www/nginx/openxpki;
            allow all;
            gzip off;
            include /usr/local/etc/nginx/fastcgi_params;
            fastcgi_pass 127.0.0.1:9900;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        # LDAP Account Manager (LAM)
        location /lam {
            index index.html;
            root /usr/local/www/nginx;
            autoindex off;

            location ~ \.php$ {
                fastcgi_split_path_info ^(.+\.php)(/.+)$;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $request_filename;
                fastcgi_pass 127.0.0.1:9000;
                include /usr/local/etc/nginx/fastcgi_params;
            }

            location ~ /lam/(tmp/internal|sess|config|lib|help|locale) {
                deny all;
                return 403;
            }
        }

        # Poudriere web interface
        location ^~ /poudriere/data/ {
            alias /usr/local/poudriere/data/logs/bulk/;
        }

        location ^~ /poudriere/ {
            alias /usr/local/share/poudriere/html/;
            index index.html;
        }

        # Default
        location / {
            try_files $uri $uri/ =404;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/local/www/nginx-dist;
        }
    }

    # =========================================================================
    # Ticket server (ticket.dzsec.net) - Requires client cert
    # =========================================================================
    server {
        listen 443 ssl;
        server_name ticket.dzsec.net;
        root /usr/local/www/nginx;
        index index.php index.html index.htm;
        charset UTF-8;

        ssl_certificate /usr/local/etc/letsencrypt/live/bridger.dzsec.net/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/bridger.dzsec.net/privkey.pem;
        include /usr/local/etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /usr/local/etc/letsencrypt/ssl-dhparams.pem;

        ssl_client_certificate /usr/local/etc/ssl/dzsec-ca-chain.pem;
        ssl_verify_client on;
        ssl_verify_depth 2;

        location /ticket {
            add_header Content-Type application/json;
            return 200 '{"status":"authenticated","message":"Kerberos ticket issued","domain":"dzsec.net"}';
        }

        location /test-cert {
            add_header Content-Type text/plain;
            return 200 "Certificate Verified\nDN: $ssl_client_s_dn\nSerial: $ssl_client_serial\nIssuer: $ssl_client_i_dn\n";
        }

        location /health {
            return 200 "Ticket Server OK - Authentication Required\n";
            add_header Content-Type text/plain;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/local/www/nginx-dist;
        }

        error_page 400 /ssl-error.html;
        location = /ssl-error.html {
            return 400 'Authentication Required\n\nThis server requires domain authentication for ticket issuance.\n\nPlease ensure you have a valid domain certificate installed.\n\nFor general access without authentication, use:\nhttps://bridger.dzsec.net/\n';
            add_header Content-Type text/plain;
        }
    }

    # =========================================================================
    # HTTP servers
    # =========================================================================
    server {
        listen 80;
        server_name bridger.dzsec.net;
        root /usr/local/share/poudriere/html;

        location /mdm-admin {
            return 301 https://$server_name$request_uri;
        }

        location /api/ {
            return 301 https://$server_name$request_uri;
        }

        location /enroll {
            return 301 https://$server_name$request_uri;
        }

        location /lam {
            return 301 https://$server_name$request_uri;
        }

        location ~* ^.+\.(jpg|jpeg|gif|png|ico|svg|woff|css|js|html)$ {
            add_header Cache-Control "public";
            expires 2d;
        }

        location ^~ /data/ {
            alias /usr/local/poudriere/data/logs/bulk/;

            location ~* ^.+\.(log|txz|tbz|bz2|gz)$ {
                add_header Cache-Control "public, must-revalidate, proxy-revalidate";
            }

            location ~* ^.+\.(json)$ {
                add_header Cache-Control "public, must-revalidate, proxy-revalidate";
                access_log off;
                log_not_found off;
            }

            location ~ /data/?.*/(logs|latest-per-pkg)/ {
                autoindex on;
            }
        }
    }

    # SCEP server (scep.dzsec.net)
    server {
        listen 80;
        server_name scep.dzsec.net;
        error_log /var/log/nginx/scep.log debug;

        location /scep {
            allow all;
            root /usr/local/www/nginx/openxpki/scep;
            include /usr/local/etc/nginx/fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_pass 127.0.0.1:9900;
            fastcgi_index scepv3.fcgi;
        }
    }

    # Ticket HTTP redirect
    server {
        listen 80;
        server_name ticket.dzsec.net;
        return 301 https://$server_name$request_uri;
    }
}
