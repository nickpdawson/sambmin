# Sambmin nginx configuration
# Place in /usr/local/etc/nginx/conf.d/sambmin.conf
# or include from main nginx.conf

upstream sambmin_api {
    server 127.0.0.1:8443;
    keepalive 32;
}

server {
    listen 80;
    server_name sambmin.dzsec.net;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sambmin.dzsec.net;

    # TLS — choose one section below

    # Option A: Let's Encrypt
    # ssl_certificate /usr/local/etc/letsencrypt/live/sambmin.dzsec.net/fullchain.pem;
    # ssl_certificate_key /usr/local/etc/letsencrypt/live/sambmin.dzsec.net/privkey.pem;

    # Option B: Local CA
    # ssl_certificate /usr/local/etc/ssl/sambmin.dzsec.net.crt;
    # ssl_certificate_key /usr/local/etc/ssl/sambmin.dzsec.net.key;
    # ssl_client_certificate /usr/local/etc/ssl/ca.crt;  # if using mTLS

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Optional: Kerberos/SPNEGO authentication at nginx level
    # Requires ngx_http_auth_spnego_module (build from ports)
    # auth_gss on;
    # auth_gss_realm DZSEC.NET;
    # auth_gss_keytab /usr/local/etc/sambmin/sambmin.keytab;
    # auth_gss_service_name HTTP;
    # auth_gss_allow_basic_fallback on;

    # API proxy
    location /api/ {
        proxy_pass http://sambmin_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Pass SPNEGO auth header if nginx handles it
        # proxy_set_header X-Remote-User $remote_user;

        proxy_read_timeout 300;
        proxy_connect_timeout 10;
    }

    # React SPA — serve static files, fallback to index.html
    location / {
        root /usr/local/share/sambmin/web;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    access_log /var/log/nginx/sambmin_access.log;
    error_log /var/log/nginx/sambmin_error.log;
}
