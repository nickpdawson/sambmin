# Sambmin Apache Virtual Host Configuration
# Requires: mod_proxy, mod_proxy_http, mod_ssl, mod_headers, mod_rewrite
#
# Enable modules:
#   a2enmod proxy proxy_http ssl headers rewrite
#
# Enable site:
#   cp sambmin.conf /etc/apache2/sites-available/
#   a2ensite sambmin
#   systemctl reload apache2

<VirtualHost *:80>
    ServerName sambmin.yourdomain.com
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName sambmin.yourdomain.com

    # TLS — adjust paths for your certificate source
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/sambmin.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/sambmin.yourdomain.com/privkey.pem

    # Security headers
    Header always set X-Frame-Options DENY
    Header always set X-Content-Type-Options nosniff
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'"

    # Static frontend files
    DocumentRoot /opt/sambmin/web

    <Directory /opt/sambmin/web>
        Options -Indexes
        AllowOverride None
        Require all granted

        # SPA fallback — serve index.html for client-side routes
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteRule ^ /index.html [L]
    </Directory>

    # Cache hashed static assets
    <LocationMatch "^/assets/">
        Header set Cache-Control "public, max-age=2592000, immutable"
    </LocationMatch>

    # API proxy to Go backend
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8443/api/ connectiontimeout=10 timeout=300
    ProxyPassReverse /api/ http://127.0.0.1:8443/api/

    # Pass real client IP to backend
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}e"
    RequestHeader set X-Forwarded-Proto "https"

    ErrorLog ${APACHE_LOG_DIR}/sambmin_error.log
    CustomLog ${APACHE_LOG_DIR}/sambmin_access.log combined
</VirtualHost>
